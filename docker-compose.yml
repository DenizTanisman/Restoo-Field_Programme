services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opencard
      POSTGRES_USER: opencard
      POSTGRES_PASSWORD: opencard
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencard"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001
    ports:
      - "5176:80"
    depends_on:
      - backend

volumes:
  pgdata:
